{% extends "base.html" %}

{% block title %}Assign Checklists - THERESE{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Assign Checklist <small class="field-hint-de">Checkliste zuweisen</small></h1>
    <div class="page-header-actions">
        <a href="{% url 'checklists:manage_template_list' %}" class="btn-secondary">← Templates</a>
    </div>
</div>

<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="form-section">
            <h3>Assignment</h3>
            <div class="aligned-field">
                <label for="template_version">Published version</label>
                <select name="template_version" id="template_version" class="form-select" required>
                    <option value="">— Select —</option>
                    {% for v in published_versions %}
                    <option value="{{ v.pk }}">{{ v.template.name_en }} ({{ v.version_label }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="aligned-field">
                <label for="employees">Employees</label>
                <select name="employees" id="employees" class="form-select" multiple size="12" required>
                    {% for e in employees %}
                    <option value="{{ e.pk }}">{{ e.get_full_name }} ({{ e.employee_number }})</option>
                    {% endfor %}
                </select>
                <small class="field-hint-de">Mehrfachauswahl mit Strg/Cmd.</small>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Assign</button>
        </div>
    </form>
</div>
{% endblock %}
