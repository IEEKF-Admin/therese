{% extends "base.html" %}

{% block title %}Delete Job - THERESE{% endblock %}

{% block content %}
<div class="page-header"><h1>Delete Job?</h1></div>
<div class="card confirm-panel">
    <p>Delete job <strong>{{ object.name }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn-danger">Yes, delete</button>
            <a href="{% url 'tasks:recruitment_job_manage' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
