{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | THERESE{% endblock %}

{% block extrastyle %}
<link rel="stylesheet" href="{% static 'css/admin_custom.css' %}">
<style>
    :root {
        --primary: #1e40af;
        --primary-light: #3b82f6;
        --header-bg: #1e3a8a;
    }
    
    body, #header, .module, .object-tools, .related-widget-wrapper {
        background-color: #f8fafc;
        color: #1e2937;
    }
    
    #header {
        background: var(--header-bg);
        color: white;
        border-bottom: 4px solid var(--primary-light);
    }
    
    #header a, #header a:visited {
        color: white;
    }
    
    .module h2, .module caption {
        background: #e0f2fe;
        color: #1e40af;
        border-bottom: 2px solid #1e40af;
    }
    
    .button, input[type=submit], input[type=button], .submit-row input {
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
    }
    
    .button:hover, input[type=submit]:hover {
        background: var(--primary-light);
    }
    
    .deletelink {
        color: #ef4444;
    }
    
    table thead th {
        background: #f1f5f9;
        color: #334155;
    }
    
    .breadcrumblist {
        background: #f8fafc;
    }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">THERESE Administration</a>
</h1>
{% endblock %}
