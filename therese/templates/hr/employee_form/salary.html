{% load widget_tweaks %}
<div class="form-section full-width">
    <h3>Salary Supplements</h3>
    {{ salary_formset.management_form }}
    <table class="item-table">
        <thead>
            <tr>
                <th>Percentage (%)</th>
                <th>Comment</th>
                <th style="width:90px; text-align:center;">Delete</th>
            </tr>
        </thead>
        <tbody id="salary-tbody">
            {% for form in salary_formset %}
            <tr class="salary-row">
                {{ form.id }}
                {{ form.DELETE }}
                <td>{{ form.percentage|add_class:"form-control" }}</td>
                <td>{{ form.comment|add_class:"form-control" }}</td>
                <td style="text-align:center;">{{ form.DELETE }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button type="button" onclick="addInlineRow('salary-tbody', 'salary-row')" class="btn-secondary">+ Add another Salary Supplement</button>
</div>
