{% extends "admin/base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<h2>Change Your Password</h2>
<p>You are required to change your password before you can continue using the system.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="default">Change Password</button>
</form>
{% endblock %}
